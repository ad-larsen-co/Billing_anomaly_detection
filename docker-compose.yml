services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing_anomaly
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing_anomaly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
